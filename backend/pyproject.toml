[project]
name = "ledger-sync"
version = "0.8.0"
description = "Production-ready data ingestion and reconciliation engine for Money Manager Pro Excel exports"
authors = [{ name = "Sagar Gupta" }]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0.0",
    "alembic>=1.18.0",
    "pandas>=2.2.0",
    "openpyxl>=3.1.0",
    "typer>=0.21.0",
    "pydantic[email]>=2.7.0",
    "pydantic-settings>=2.2.0",
    "rich>=14.0.0",
    "fastapi>=0.128.0",
    "uvicorn[standard]>=0.40.0",
    "python-multipart>=0.0.22",
    "PyJWT>=2.12.0",
    "bcrypt>=4.0.1",
    "psycopg[binary]>=3.2.0",
    "slowapi>=0.1.9",
    "httpx>=0.28.0",
]

[project.scripts]
ledger-sync = "ledger_sync.cli.main:app"

[dependency-groups]
dev = [
    "pytest>=9.0.0",
    "pytest-cov>=6.0.0",
    "ruff>=0.15.0",
    "mypy>=1.10.0",
    "pandas-stubs>=2.2.0",
    "types-openpyxl>=3.1.0",
    "pip-audit>=2.7.0",
    "pre-commit>=4.0.0",
]

[tool.uv]
package = true
# Force pygments >=2.20.0 to fix CVE-2026-4539
constraint-dependencies = ["pygments>=2.20.0"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.ruff.lint.per-file-ignores]
# Allow asserts in tests
"tests/**/*.py" = ["S101"]
# Migration files are auto-generated
"**/migrations/**/*.py" = ["D100", "D103", "D104", "D400", "D415"]
# FastAPI dependency injection uses Depends() in defaults - this is the standard pattern
# Boolean params in Query() are also standard FastAPI patterns
# PERF401 - conditional appends in loops are more readable than list.extend alternatives
"src/ledger_sync/api/**/*.py" = ["B008", "FBT001", "FBT002", "FBT003", "PERF401"]
# CLI uses typer.Argument/Option in defaults - this is the standard pattern
"src/ledger_sync/cli/**/*.py" = ["B008", "FBT001", "FBT002", "FBT003"]
# Core module has boolean parameter in sync_engine.import_file which is intentional
# PERF401 - conditional appends in loops are more readable
"src/ledger_sync/core/sync_engine.py" = ["FBT001", "FBT002"]
"src/ledger_sync/core/analytics_engine.py" = ["PERF401"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = "openpyxl.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "slowapi.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "ledger_sync.db.migrations.*"
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ledger_sync"]
