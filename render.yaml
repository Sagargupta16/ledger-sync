services:
  - type: web
    name: ledger-sync-api
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: pip install uv && uv sync --no-group dev && (uv run alembic upgrade head 2>/dev/null || (uv run alembic stamp af63e055055a && uv run alembic upgrade head))
    startCommand: uv run uvicorn ledger_sync.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: LEDGER_SYNC_ENVIRONMENT
        value: production
      - key: LEDGER_SYNC_DATABASE_URL
        sync: false  # Set manually in Render dashboard (Neon connection string)
      - key: LEDGER_SYNC_JWT_SECRET_KEY
        generateValue: true  # Render auto-generates a random secret
      - key: LEDGER_SYNC_CORS_ORIGINS
        value: '["https://sagargupta16.github.io", "https://sagargupta.online", "https://www.sagargupta.online", "http://localhost:5173"]'
      - key: LEDGER_SYNC_FRONTEND_URL
        value: "https://sagargupta.online/ledger-sync"
      # OAuth (optional — set in Render dashboard to enable)
      - key: LEDGER_SYNC_GOOGLE_CLIENT_ID
        sync: false
      - key: LEDGER_SYNC_GOOGLE_CLIENT_SECRET
        sync: false
      - key: LEDGER_SYNC_GITHUB_CLIENT_ID
        sync: false
      - key: LEDGER_SYNC_GITHUB_CLIENT_SECRET
        sync: false
    healthCheckPath: /health
