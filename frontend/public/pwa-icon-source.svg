<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#5E5CE6"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background for maskable. Safe zone is the central 80% (offset 51.2..460.8). -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Glyph centered, scaled to fit inside the maskable safe zone. -->
  <g fill="#ffffff" transform="translate(128, 128)">
    <!-- Stylized "L" ledger mark: vertical bar + horizontal baseline, with an ascending trend line above. -->
    <rect x="20" y="32" width="32" height="192" rx="6"/>
    <rect x="20" y="192" width="216" height="32" rx="6"/>
    <!-- Trend line: ascending steps representing growth / analytics -->
    <path d="M 76 160 L 108 128 L 140 144 L 172 96 L 204 64"
          fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- End-of-trend accent dot -->
    <circle cx="204" cy="64" r="10"/>
  </g>
</svg>
