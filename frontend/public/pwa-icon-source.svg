<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#5E5CE6"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed tile. Maskable safe zone = central 80% (approx 51..461). -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Ascending trend line behind the rupee, low-opacity white.
       Positioned so it reads as 'growth' beneath the mark. -->
  <g stroke="#ffffff" stroke-opacity="0.28" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 120 360 L 200 300 L 270 330 L 360 220" stroke-width="24"/>
  </g>
  <circle cx="360" cy="220" r="20" fill="#ffffff" fill-opacity="0.45"/>

  <!-- Rupee mark (₹) in bold white, centered on the tile.
       Strokes use rounded caps/joins for a soft, app-icon feel. -->
  <g fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top horizontal bar -->
    <line x1="168" y1="160" x2="344" y2="160"/>
    <!-- Second horizontal bar -->
    <line x1="168" y1="220" x2="344" y2="220"/>
    <!-- Vertical stem on the left -->
    <line x1="188" y1="160" x2="188" y2="296"/>
    <!-- Rupee belly: arc that loops from second bar down to the stem, curling right -->
    <path d="M 260 220
             C 330 220, 348 264, 348 288
             C 348 324, 312 348, 260 348
             L 188 348"/>
    <!-- Diagonal descender from under the belly out to the bottom-right -->
    <line x1="220" y1="344" x2="344" y2="420"/>
  </g>
</svg>
