<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#5E5CE6"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed tile. Gradient paints corner to corner so the apple-touch
       icon has no whitespace frame; iOS masks this to a squircle on home. -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Ascending trend line in low-opacity white. Sized so it reads as
       'growth' behind the rupee glyph at both 180px and 1024px. -->
  <g stroke="#ffffff" stroke-opacity="0.22" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 88 380 L 188 300 L 270 340 L 400 200" stroke-width="28"/>
  </g>
  <circle cx="400" cy="200" r="24" fill="#ffffff" fill-opacity="0.45"/>

  <!-- Rupee mark (₹), enlarged so it occupies ~70% of the tile edge-to-edge.
       Maskable safe zone (central 80% = 51..461) still clears all strokes. -->
  <g fill="none" stroke="#ffffff" stroke-width="42" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top horizontal bar -->
    <line x1="130" y1="140" x2="380" y2="140"/>
    <!-- Second horizontal bar -->
    <line x1="130" y1="212" x2="380" y2="212"/>
    <!-- Vertical stem on the left -->
    <line x1="158" y1="140" x2="158" y2="312"/>
    <!-- Rupee belly: arc from second bar down to the stem, curling right -->
    <path d="M 248 212
             C 340 212, 364 266, 364 298
             C 364 342, 320 372, 252 372
             L 158 372"/>
    <!-- Diagonal descender from under the belly to bottom-right -->
    <line x1="200" y1="368" x2="388" y2="460"/>
  </g>
</svg>
