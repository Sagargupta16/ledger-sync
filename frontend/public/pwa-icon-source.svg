<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Exact same gradient the web app uses for the PiggyBank brand tile
         (see HomePage header + Sidebar brand row). Keeps the installed app
         icon visually identical to what users see in-app. -->
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#5E5CE6"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed tile: gradient paints corner to corner so on iOS the
       native squircle mask is the only rounding. No whitespace frame. -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!--
    Lucide `piggy-bank` paths, centered on the tile and scaled to ~68% of
    the width so the glyph fills confidently without touching the maskable
    safe zone (central 80% = 51..461). stroke-width 1.9 in the 24-unit space
    => ~28px in the 512 tile at scale(15), which is thick enough to read
    at 64x64 favicon sizes without looking heavy at 512x512.
  -->
  <g
    transform="translate(76 76) scale(15)"
    fill="none"
    stroke="#ffffff"
    stroke-width="1.9"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M11 17h3v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-3a3.16 3.16 0 0 0 2-2h1a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1h-1a5 5 0 0 0-2-4V3a4 4 0 0 0-3.2 1.6l-.3.4H11a6 6 0 0 0-6 6v1a5 5 0 0 0 2 4v3a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1z"/>
    <path d="M16 10h.01"/>
    <path d="M2 8v1a2 2 0 0 0 2 2h1"/>
  </g>
</svg>
