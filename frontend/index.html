<!doctype html>
<html lang="en">
  <head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PFFMG7D8DP"></script>
    <script>
      globalThis.dataLayer = globalThis.dataLayer || [];
      function gtag(){globalThis.dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PFFMG7D8DP');
    </script>
    <meta charset="UTF-8" />
    <!-- Apply the saved theme before first paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('ledger-sync-theme') || 'dark';
          var resolved = m === 'system'
            ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
            : m;
          document.documentElement.setAttribute('data-theme', resolved);
          // Keep the mobile browser chrome (address bar / status bar) in step
          // with the theme so it doesn't render black behind the warm light UI.
          var bar = resolved === 'light' ? '#f6f3ee' : '#000000';
          var setMeta = function (name, content) {
            var el = document.querySelector('meta[name="' + name + '"]');
            if (el) el.setAttribute('content', content);
          };
          setMeta('theme-color', bar);
          setMeta('color-scheme', resolved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Ledger Sync — Self-hosted personal finance dashboard with analytics, budgeting, and tax planning." />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ledger Sync" />
    <title>Ledger Sync</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
