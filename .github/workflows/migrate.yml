name: Run Database Migrations

on:
  push:
    branches: [main]
    paths:
      - 'backend/alembic/**'
      - 'backend/src/ledger_sync/db/migrations/**'
      - 'backend/src/ledger_sync/db/models.py'
      - 'backend/src/ledger_sync/db/_models/**'

  workflow_dispatch: # Allow manual trigger

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8

      - name: Install dependencies
        working-directory: backend
        run: uv sync --locked --no-build --no-install-project --no-group dev

      - name: Run Alembic migrations
        working-directory: backend
        env:
          LEDGER_SYNC_DATABASE_URL: ${{ secrets.LEDGER_SYNC_DATABASE_URL }}
          PYTHONPATH: src
        run: uv run --no-sync --locked --no-build alembic upgrade head
