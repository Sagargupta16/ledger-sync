name: Run Database Migrations

on:
  push:
    branches: [main]
    paths:
      - 'backend/alembic/**'
      - 'backend/src/ledger_sync/db/migrations/**'
      - 'backend/src/ledger_sync/db/models.py'
      - 'backend/src/ledger_sync/db/_models/**'

  workflow_dispatch: # Allow manual trigger

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      - name: Install dependencies
        working-directory: backend
        run: uv sync --locked --no-build --no-install-project --no-group dev

      - name: Run Alembic migrations
        working-directory: backend
        env:
          LEDGER_SYNC_DATABASE_URL: ${{ secrets.LEDGER_SYNC_DATABASE_URL }}
          PYTHONPATH: src
        run: uv run --no-sync --locked --no-build alembic upgrade head
