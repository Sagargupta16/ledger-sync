name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ── Setup Python ────────────────────────────────────────────────
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Poetry
        run: pip install poetry
      - name: Cache Poetry dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-

      # ── Setup Node ──────────────────────────────────────────────────
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Cache pnpm dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      # ── Install all dependencies (backend + frontend + root) ────────
      - name: Install dependencies
        run: |
          cd backend && poetry install --with dev && cd ..
          cd frontend && pnpm install --frozen-lockfile && cd ..
          pnpm install

      # ── Dependency audit (both stacks in parallel) ──────────────────
      - name: Dependency audit
        run: |
          cd backend && poetry run pip audit &
          cd frontend && pnpm audit --prod || true
          wait
        continue-on-error: true

      # ── Lint (both stacks in parallel via concurrently) ─────────────
      - name: Lint
        run: pnpm run lint

      # ── Type check (both stacks in parallel via concurrently) ───────
      - name: Type check
        run: pnpm run type-check

      # ── Test (both stacks in parallel via concurrently) ─────────────
      - name: Test
        run: pnpm run test

      # ── Build frontend ─────────────────────────────────────────────
      - name: Build frontend
        run: VITE_API_BASE_URL=https://placeholder.example.com pnpm run build
