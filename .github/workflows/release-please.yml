name: Release Please
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Maintains a release PR that accumulates the next version + CHANGELOG
      # entry from Conventional Commits. Merging that PR bumps the version in
      # package.json, frontend/package.json, and backend/pyproject.toml (via
      # extra-files in release-please-config.json), updates CHANGELOG.md, tags
      # the commit, and cuts a GitHub Release.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
